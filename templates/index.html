<!DOCTYPE html>
<html>
<head>
    <title>Library Management</title>

    <style>
        body { font-family: Arial; margin: 20px; }
        h1 { color: #1e40af; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background-color: #2563eb;
            color: white;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e40af;
        }

        input {
            padding: 5px;
            margin: 3px;
        }

        .form-section {
            margin-top: 20px;
        }
    </style>

<script>

async function loadBooks() {
    const res = await fetch("/books/");
    
    const books = await res.json();
    const tbody = document.getElementById("books_tbody");
    tbody.innerHTML = "";

    books.forEach(book => {
        tbody.innerHTML += `
        <tr>
            <td>${book.id}</td>
            <td>${book.title}</td>
            <td>${book.author}</td>
            <td>${book.genre}</td>
            <td>${book.publication_year}</td>
            <td>
                <button onclick="updateBook(${book.id})">Update</button>
                <button onclick="deleteBook(${book.id})">Delete</button>
                <button onclick="summarizeBook('${book.title}', '${book.author}')">Summary</button>
                <button onclick="recommendBooks('${book.title}', '${book.author}')">Recommend</button>
            </td>
        </tr>`;
    });
}

async function createBook() {
    const book = {
        title: create_title.value,
        author: create_author.value,
        description: create_description.value,
        genre: create_genre.value,
        publication_year: parseInt(create_year.value)
    };

    const res = await fetch("/books/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(book)
    });

    if (res.ok) {
        alert("Book created!");
        loadBooks();
    } else {
        alert("Not authorized (admin only)");
    }
}

async function updateBook(id) {
    const book = {
        title: prompt("New title:"),
        author: prompt("New author:"),
        description: "",
        genre: "",
        publication_year: 2024
    };

    const res = await fetch(`/books/${id}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(book)
    });

    if (res.ok) {
        alert("Book updated!");
        loadBooks();
    } else {
        alert("Admin only");
    }
}

async function deleteBook(id) {
    const res = await fetch(`/books/${id}`, {
        method: "DELETE"
    });

    if (res.ok) {
        alert("Deleted!");
        loadBooks();
    } else {
        alert("Admin only");
    }
}

async function summarizeBook(title, author) {
    const res = await fetch(`/books/summary?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`);

    if (res.ok) {
        const data = await res.json();
        alert("Summary:\n\n" + data.summary);
    } else {
        alert("Login required (admin or user)");
    }
}

async function recommendBooks(title, author) {
    const res = await fetch(`/books/recommendations?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`);

    if (res.ok) {
        const data = await res.json();
        alert("Recommendations:\n\n" + data.recommendations);
    } else {
        alert("Login required (admin or user)");
    }
}

window.onload = loadBooks;

</script>
</head>

<body>

<h1>Library Management System</h1>

<div class="form-section">
    <h3>Create Book (Admin Only)</h3>
    <input id="create_title" placeholder="Title">
    <input id="create_author" placeholder="Author">
    <input id="create_description" placeholder="Description">
    <input id="create_genre" placeholder="Genre">
    <input id="create_year" placeholder="Year">
    <button onclick="createBook()">Create</button>
</div>

<div class="form-section">
    <h3>Update Book (Admin Only)</h3>
    <input id="update_title" placeholder="Title">
    <input id="update_author" placeholder="Author">
    <input id="update_description" placeholder="Description">
    <input id="update_genre" placeholder="Genre">
    <input id="update_year" placeholder="Year">
    <button onclick="updateBook()">Update</button>
</div>

<div class="form-section">
    <h3>Delete Book (Admin Only)</h3>
    <input id="delete-id" placeholder="Book Id">
    
    <button onclick="deleteBook(document.getElementById('delete_id').value)">Delete</button>
</div>

<div class="form-section">
    <h3>Summarize Book (Admin Only)</h3>
    <input id="create_title" placeholder="Title">
    <input id="create_author" placeholder="Author">
    
    <button onclick="summarizeBook(document.getElementById('create_title').value, document.getElementById('create_author').value)">Summarize</button>
</div>

<div class="form-section">
    <h3>Recommend Books (Admin Only)</h3>
    <input id="create_title" placeholder="Title">
    <input id="create_author" placeholder="Author">
    
    <button onclick="recommendBooks(document.getElementById('create_title').value, document.getElementById('create_author').value)">Recommend</button>
</div>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="books_tbody"></tbody>
</table>

</body>
</html>
